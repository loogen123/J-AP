server:
  port: 8080

spring:
  application:
    name: j-architect-pilot
  
  threads:
    virtual:
      enabled: true
  
  datasource:
    url: jdbc:h2:mem:japdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms

management:
  health:
    redis:
      enabled: false

jap:
  sandbox:
    base-dir: generated-workspace
    process:
      max-execution-time: 120s
      max-memory-mb: 512
      allowed-network-hosts:
        - repo.maven.apache.org
        - repo1.maven.org
  
  agent:
    max-concurrent: 10
    default-max-retries: 3
  
  llm:
    base-url: ${JAP_LLM_BASE_URL:https://api.deepseek.com}
    api-key: ${JAP_LLM_API_KEY:}
    model-name: ${JAP_LLM_MODEL:deepseek-chat}
    temperature: 0.3
    max-tokens: 8192
    timeout-seconds: 120
    log-requests: true
    log-responses: true

logging:
  level:
    com.jap: DEBUG
    org.springframework.web: INFO
    dev.langchain4j: DEBUG
